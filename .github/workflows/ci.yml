name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: make lint

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats jq openssh-client libelf-dev libdw-dev libssl-dev libcurl4-openssl-dev
          sudo apt-get remove -y sshpass || true

      - name: Cache kcov
        id: kcov-cache
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/kcov
          key: kcov-${{ runner.os }}-v43

      - name: Build kcov
        if: steps.kcov-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y cmake g++ binutils-dev libiberty-dev zlib1g-dev
          git clone --depth=1 https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
          cmake -S /tmp/kcov-src -B /tmp/kcov-build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/kcov-build -j"$(nproc)"
          sudo cmake --install /tmp/kcov-build

      - name: Run tests and coverage
        run: make coverage

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: reports/tests/report.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          directory: reports/coverage/
          token: ${{ secrets.CODECOV_TOKEN }}
