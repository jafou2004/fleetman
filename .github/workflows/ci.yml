name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats jq openssh-client
          sudo apt-get remove -y sshpass || true

      - name: Run Bats tests
        run: make test

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: reports/tests/report.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies and kcov
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats jq openssh-client cmake g++ binutils-dev libiberty-dev libssl-dev libelf-dev libdw-dev zlib1g-dev libcurl4-openssl-dev
          sudo apt-get remove -y sshpass || true
          git clone --depth=1 https://github.com/SimonKagstrom/kcov.git /tmp/kcov-src
          cmake -S /tmp/kcov-src -B /tmp/kcov-build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/kcov-build -j"$(nproc)"
          sudo cmake --install /tmp/kcov-build

      - name: Run coverage
        run: make coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          directory: reports/coverage/
          token: ${{ secrets.CODECOV_TOKEN }}
